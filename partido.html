<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidos del dia - Torneo Las Colinas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="zona-activacion-menu"></div>
    
    <nav class="menu-oculto">
        <a href="/">Tabla de Posiciones</a>
        <a href="/fixture">Fixture</a>
        <a href="/resultados">Resultados</a>
        <a href="/partido">Partidos del Día</a>
    </nav>

    <div class="contenedor-principal">
        <header class="header-torneo">
            <img src="assets/img/logo.png" alt="Logo Torneo Las Colinas" class="logo-torneo">
            <div class="titulo-torneo">
                <span>Torneo</span>
                <span>Las Colinas</span>
            </div>
        </header>

        <div class="contenedor-partido-destacado">
            
            <div class="encabezado-destacado">
                <span class="badge-jornada">Jornada 1</span>
            </div>

            <div class="cuerpo-destacado">
                <div class="equipo-destacado">
                    <img src="assets/img/la30pte.png" class="img-escudo-destacado" alt="Amigos de Nacho">
                    <span class="nombre-destacado">La 30 PTE</span>
                </div>

                <div class="centro-destacado">
                    <span class="vs-destacado">VS</span>
                    <div class="fecha-destacada">Martes 28/04</div>
                    <div class="hora-destacada">7:30 PM</div>
                </div>

                <div class="equipo-destacado">
                    <img src="assets/img/Los-Fresas-sf.png" class="img-escudo-destacado" alt="Amigos del bola">
                    <span class="nombre-destacado">Los Fresas</span>
                </div>
            </div>

            <div class="divisor-destacado"></div>

            <div class="cuerpo-destacado">
                <div class="equipo-destacado">
                    <img src="assets/img/san-pedro-fc-sf.png" class="img-escudo-destacado" alt="La 30 PTE">
                    <span class="nombre-destacado">San Pedro FC</span>
                </div>

                <div class="centro-destacado">
                    <span class="vs-destacado">VS</span>
                    <div class="fecha-destacada">Martes 28/04</div>
                    <div class="hora-destacada">8:30 PM</div>
                </div>

                <div class="equipo-destacado">
                    <img src="assets/img/los-chamos-fc.png" class="img-escudo-destacado" alt="Los Fresas">
                    <span class="nombre-destacado">Los Chamos FC</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
