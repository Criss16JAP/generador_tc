<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partido Individual - Torneo Las Colinas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="contenedor-principal">
        <header class="header-torneo">
            <img src="assets/img/logo.png" alt="Logo Torneo Las Colinas" class="logo-torneo">
            <div class="titulo-torneo">
                <span>Torneo</span>
                <span>Las Colinas</span>
            </div>
        </header>

        <div class="contenedor-partido-destacado">
            
            <div class="encabezado-destacado">
                <span class="badge-jornada">Jornada 3</span>
            </div>

            <div class="cuerpo-destacado">
                
                <div class="equipo-destacado">
                    <img src="assets/img/por-defecto.png" class="img-escudo-destacado" alt="Minca FC">
                    <span class="nombre-destacado">Amigos de Nacho</span>
                </div>

                <div class="centro-destacado">
                    <span class="vs-destacado">VS</span>
                    <div class="fecha-destacada">Miércoles 28/04</div>
                    <div class="hora-destacada">8:30 PM</div>
                </div>

                <div class="equipo-destacado">
                    <img src="assets/img/amigos-del-bola.png" class="img-escudo-destacado" alt="Amigos del bola">
                    <span class="nombre-destacado">Amigos del Bola</span>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
