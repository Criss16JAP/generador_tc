<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture de la Semana - Torneo Las Colinas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="contenedor-principal">
        <header class="header-torneo">
            <img src="assets/img/logo.png" alt="Logo Torneo Las Colinas" class="logo-torneo">
            <div class="titulo-torneo">
                <span>Torneo</span>
                <span>Las Colinas</span>
            </div>
        </header>

        <div class="contenedor-fixture">
            <h1 class="titulo-tabla">Jornada 3</h1>
            
            <div class="cuerpo-fixture">
                
                <div class="dia-bloque">
                    <h2 class="titulo-dia">Lunes</h2>
                    
                    <div class="partido">
                        <div class="equipo local">
                            <span class="nombre-equipo">San Pedro FC</span>
                            <img src="assets/img/san-pedro-fc-sf.png" class="img-escudo" alt="San Pedro FC">
                        </div>
                        <div class="info-partido">
                            <span class="hora">19:00</span>
                            <span class="vs">VS</span>
                        </div>
                        <div class="equipo visitante">
                            <img src="assets/img/Unicolinas.png" class="img-escudo" alt="Unicolinas">
                            <span class="nombre-equipo">Unicolinas</span>
                        </div>
                    </div>
                    
                    <div class="partido">
                        <div class="equipo local">
                            <span class="nombre-equipo">Minca FC</span>
                            <img src="assets/img/Minca.png" class="img-escudo" alt="Minca FC">
                        </div>
                        <div class="info-partido">
                            <span class="hora">20:30</span>
                            <span class="vs">VS</span>
                        </div>
                        <div class="equipo visitante">
                            <img src="assets/img/alianza-sf.png" class="img-escudo" alt="Alianza Samaria">
                            <span class="nombre-equipo">Alianza Samaria</span>
                        </div>
                    </div>
                </div>

                <div class="dia-bloque">
                    <h2 class="titulo-dia">Martes</h2>
                    
                    <div class="partido">
                        <div class="equipo local">
                            <span class="nombre-equipo">Fly Soccer</span>
                            <img src="assets/img/Fly-Soccer-sf.png" class="img-escudo" alt="Fly Soccer">
                        </div>
                        <div class="info-partido">
                            <span class="hora">19:30</span>
                            <span class="vs">VS</span>
                        </div>
                        <div class="equipo visitante">
                            <img src="assets/img/la-rosalia.png" class="img-escudo" alt="La Rosalia FC">
                            <span class="nombre-equipo">La Rosalia FC</span>
                        </div>
                    </div>
                </div>

                <div class="dia-bloque">
                    <h2 class="titulo-dia">Miércoles</h2>
                    
                    <div class="partido">
                        <div class="equipo local">
                            <span class="nombre-equipo">Amigos de nacho</span>
                            <img src="assets/img/por-defecto.png" class="img-escudo" alt="Amigos de nacho">
                        </div>
                        <div class="info-partido">
                            <span class="hora">20:00</span>
                            <span class="vs">VS</span>
                        </div>
                        <div class="equipo visitante">
                            <img src="assets/img/por-defecto.png" class="img-escudo" alt="La Bonga">
                            <span class="nombre-equipo">La Bonga</span>
                        </div>
                    </div>
                </div>

                <div class="dia-bloque">
                    <h2 class="titulo-dia">Jueves</h2>
                    
                    <div class="partido">
                        <div class="equipo local">
                            <span class="nombre-equipo">Amigos del bola</span>
                            <img src="assets/img/amigos-del-bola.png" class="img-escudo" alt="Amigos del bola">
                        </div>
                        <div class="info-partido">
                            <span class="hora">19:00</span>
                            <span class="vs">VS</span>
                        </div>
                        <div class="equipo visitante">
                            <img src="assets/img/la30pte.png" class="img-escudo" alt="La 30 pte">
                            <span class="nombre-equipo">La 30 pte</span>
                        </div>
                    </div>
                </div>

                <div class="bloque-descanso">
                    <span class="texto-descanso">Equipo en descanso esta jornada:</span>
                    <div class="equipo-libre">
                        <img src="assets/img/Los-Fresas-sf.png" class="img-escudo" alt="Los Fresas">
                        <strong>Los Fresas</strong>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
